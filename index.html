<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--borgogna:#0D3B36;--viola:#1A6B5E;--lavanda:#5FB89C;--nero:#0F1A18;--panna:#F2F7F5;--carta:#FAFBF9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Josefin Sans',sans-serif;background:var(--nero);color:var(--panna);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--nero);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(95,184,156,0.25);flex-shrink:0;z-index:1000;gap:16px;}
.logo{display:flex;align-items:baseline;gap:10px;}
.lt-img{height:24px;display:block;}
.ls{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--lavanda);}
.header-right{display:flex;align-items:center;gap:14px;}

/* LANGUAGE SWITCHER */
.lang-switch{display:flex;gap:4px;}
.lang-btn{background:none;border:1px solid rgba(95,184,156,.3);color:rgba(242,247,245,.6);font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:.1em;padding:5px 9px;cursor:pointer;transition:all .2s;}
.lang-btn:hover{border-color:var(--lavanda);color:var(--panna);}
.lang-btn.active{background:var(--lavanda);color:var(--nero);border-color:var(--lavanda);}

.buy-btn{padding:7px 18px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border:none;background:var(--borgogna);color:white;font-family:'Josefin Sans',sans-serif;text-decoration:none;transition:all .2s;white-space:nowrap;}
.buy-btn:hover{background:#15564E;}

#map{flex:1;z-index:1;}

/* LEGEND PANEL */
.legend{position:fixed;right:0;top:57px;bottom:0;width:280px;background:rgba(15,26,24,0.95);border-left:1px solid rgba(95,184,156,.2);z-index:500;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;}
.legend-header{padding:14px 16px 10px;border-bottom:1px solid rgba(95,184,156,.1);}
.legend-header h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;}
.legend-header p{font-size:8px;letter-spacing:.14em;color:var(--lavanda);margin-top:3px;text-transform:uppercase;}
.legend-list{overflow-y:auto;flex:1;}
.legend-list::-webkit-scrollbar{width:2px;}
.legend-list::-webkit-scrollbar-thumb{background:var(--viola);}
.li{padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:10px;}
.li:hover{background:rgba(95,184,156,.07);}
.li.active{background:rgba(95,184,156,.1);border-left-color:var(--lavanda);}
.li-icon{flex-shrink:0;width:22px;height:22px;}
.li-info h3{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;line-height:1.2;color:var(--panna);}
.li-info span{font-size:7px;letter-spacing:.1em;color:rgba(242,247,245,0.55);display:block;margin-top:2px;}

/* TOGGLE */
.legend-toggle{display:none;position:fixed;bottom:24px;right:16px;z-index:999;background:var(--borgogna);border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;justify-content:center;}
.legend-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--carta)!important;border:1px solid rgba(95,184,156,.3)!important;border-radius:2px!important;box-shadow:0 8px 32px rgba(0,0,0,.4)!important;color:#16241F!important;max-width:280px!important;}
.leaflet-popup-tip{background:var(--carta)!important;}
.leaflet-popup-close-button{color:#5FB89C!important;}
.pw{font-family:'Josefin Sans',sans-serif;}
.ph{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(95,184,156,.2);}
.pht h3{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;line-height:1.2;margin-bottom:2px;}
.pf{font-size:8px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;}
.paddr{font-size:9px;color:#3D5650;margin-bottom:6px;line-height:1.5;}
.pphoto{width:100%;height:120px;border-radius:2px;margin-bottom:10px;overflow:hidden;background:linear-gradient(135deg, rgba(13,59,54,.08), rgba(95,184,156,.15));display:flex;align-items:center;justify-content:center;}
.pphoto img{width:100%;height:100%;object-fit:cover;display:block;}
.pphoto-placeholder{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#7FAEA0;text-align:center;padding:0 10px;}
.pdesc{font-size:11px;color:#2C403B;margin-bottom:12px;line-height:1.5;}
.ptag{display:inline-block;font-size:7px;letter-spacing:.15em;text-transform:uppercase;padding:2px 8px;margin-bottom:8px;border-radius:1px;background:rgba(13,59,54,.1);color:var(--borgogna);border:1px solid rgba(13,59,54,.3);}

.pbtn{display:block;width:100%;padding:8px;text-align:center;font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;text-decoration:none;border:none;cursor:pointer;margin-bottom:6px;}
.pbtn-buy{background:var(--borgogna);color:white;}
.pbtn-buy:hover{background:#15564E;}
.pbtn-map{background:transparent;border:1px solid rgba(95,184,156,.4);color:#1A6B5E;}
.pbtn-map:hover{background:rgba(95,184,156,.1);}

/* CONTACT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--carta);color:#16241F;width:90%;max-width:380px;padding:24px;position:relative;border:1px solid rgba(95,184,156,.3);}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:4px;}
.modal .msub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#1A6B5E;margin-bottom:16px;}
.modal-close{position:absolute;top:14px;right:14px;cursor:pointer;font-size:18px;color:#5FB89C;background:none;border:none;line-height:1;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#1A6B5E;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;padding:8px;border:1px solid rgba(95,184,156,.3);background:white;font-family:'Josefin Sans',sans-serif;font-size:12px;color:#16241F;}
.field textarea{resize:vertical;min-height:70px;}
.modal-submit{width:100%;padding:10px;background:var(--borgogna);color:white;border:none;font-size:9px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;font-family:'Josefin Sans',sans-serif;margin-top:4px;}
.modal-submit:hover{background:#15564E;}
.modal-alt{display:block;text-align:center;font-size:9px;color:#1A6B5E;margin-top:10px;text-decoration:underline;}
#formStatus{text-align:center;padding:16px 0;font-size:12px;line-height:1.6;}
#formStatus.success{color:#1A6B5E;}
#formStatus.error{color:#8B3A3A;}

@media(max-width:768px){
  .legend{transform:translateX(100%);}
  .legend.open{transform:translateX(0);}
  .legend-toggle{display:flex;}
  .legend-overlay.open{display:block;}
  .lt-img{height:18px;}
  .ls{display:none;}
  header{padding:10px 12px;}
}
</style>
</head>

    desc:{
      it:'Ampio appartamento al piano terra con accesso privato su tipica corte veneziana. Una camera matrimoniale, una camera doppia, bagno con vasca, grande zona living in cui rilassarsi dopo una giornata alla scoperta di Venezia. Ideale per famiglie alla ricerca di una vera casa a Venezia.',

    desc:{
      it:'Affascinante bilocale vista mare in un suggestivo palazzo di fianco al famoso Hotel Excelsior. Dotato di camera matrimoniale con letto queen size e bagno ensuite, gode di una magnifica terrazza abitabile affacciata sulla spiaggia. Il residence ha un accesso privato sulla spiaggia, con docce e servizi, unico nel suo genere.',
      en:'Charming two-room apartment with sea view in a striking building next to the famous Hotel Excelsior. Featuring a queen-size bedroom with en-suite bathroom, it boasts a magnificent livable terrace overlooking the beach. The residence offers private beach access with showers and facilities — truly one of a kind.',
      fr:'Charmant appartement de deux pièces avec vue sur la mer, dans un élégant palais voisin du célèbre Hôtel Excelsior. Doté d\'une chambre avec lit queen size et salle de bain privative, il dispose d\'une magnifique terrasse habitable donnant sur la plage. La résidence offre un accès privé à la plage, avec douches et services, unique en son genre.'
    }

function pinSVG(color){
  return iconByColor[color] || iconByColor['#0D3B36'];
}

var markers = []; // store {marker, apt, leafletMarker}
var list = document.getElementById('legend-list');

apartments.forEach(function(a){
  var uri = pinSVG(a.col);
  var icon = L.divIcon({
    html:'<img src="'+uri+'" width="40" height="40" style="display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));"/>',
    className:'',iconSize:[40,40],iconAnchor:[20,20],popupAnchor:[0,-22]
  });
  var m = L.marker([a.lat,a.lng],{icon:icon}).addTo(map);

  m.on('click',function(){
    document.querySelectorAll('.li').forEach(function(el){el.classList.remove('active');});
    var el=document.querySelector('[data-id="'+a.id+'"]');
    if(el)el.classList.add('active');
  });

  // Sidebar item
  var d = document.createElement('div');
  d.className='li';
  d.setAttribute('data-id',a.id);
  d.innerHTML='<div class="li-icon"><img src="'+uri+'" width="22" height="22" style="display:block;"/></div>'
    +'<div class="li-info"><h3 class="li-name"></h3><span class="li-civ"></span></div>';
  d.addEventListener('click',function(){
    map.setView([a.lat,a.lng],16,{animate:true});
    m.openPopup();
    document.querySelectorAll('.li').forEach(function(el){el.classList.remove('active');});
    d.classList.add('active');
  });
  list.appendChild(d);

  markers.push({apt:a, leafletMarker:m, uri:uri, sidebarEl:d});
});

function renderPopup(entry){
  var a = entry.apt;
  var t = i18n[currentLang];
  var nome = a.nome[currentLang];
  var civ = a.civ[currentLang];
  var desc = a.desc[currentLang];
  var mailtoHref = 'mailto:'+CONTACT_EMAIL+'?subject='+encodeURIComponent(t.mailSubject+nome)+'&body='+encodeURIComponent(t.mailBody(nome,civ));

  var placeholderText = (a.photoNote && a.photoNote[currentLang]) ? a.photoNote[currentLang] : t.photoSoon;
  var photoHtml = a.photo
    ? '<div class="pphoto"><img src="'+a.photo+'" alt="'+nome+'"/></div>'
    : '<div class="pphoto"><span class="pphoto-placeholder">'+placeholderText+'</span></div>';

  var popup = '<div class="pw">'
    +'<span class="ptag">'+t.tag+'</span>'
    +photoHtml
    +'<div class="ph"><div><img src="'+entry.uri+'" width="24" height="24"/></div>'
    +'<div class="pht"><h3 style="color:'+a.col+';">'+nome+'</h3>'
    +'<div class="pf" style="color:'+a.col+';">'+civ+'</div></div></div>'
    +'<div class="pdesc">'+desc+'</div>'
    +'<button class="pbtn pbtn-buy" onclick="openModal(\''+a.id+'\')">'+t.requestInfo+'</button>'
    +'<a href="'+mailtoHref+'" class="pbtn pbtn-map">'+t.writeEmail+'</a>'
    +'</div>';
  entry.leafletMarker.bindPopup(popup,{maxWidth:280});
  entry.mailtoHref = mailtoHref;

  entry.sidebarEl.querySelector('.li-name').textContent = nome;
  entry.sidebarEl.querySelector('.li-civ').textContent = civ;
}

function renderAllPopups(){
  markers.forEach(renderPopup);
}

// ============================================================
// MODALE DI CONTATTO / CONTACT MODAL / MODALE DE CONTACT
// ============================================================
function openModal(aptId){
  var entry = markers.filter(function(e){return e.apt.id===aptId;})[0];
  if(!entry) return;
  var nome = entry.apt.nome[currentLang];
  document.getElementById('modalTitle').textContent = i18n[currentLang].modalTitle;
  document.getElementById('modalSub').textContent = nome.toUpperCase();
  document.getElementById('modalSub').style.display = 'block';
  document.getElementById('aptSelectField').style.display = 'none';
  document.getElementById('modalApt').value = nome;
  document.getElementById('modalMailto').href = entry.mailtoHref;
  document.getElementById('modalOverlay').classList.add('open');
  resetContactForm();
}

function openGenericModal(){
  var t = i18n[currentLang];
  var select = document.getElementById('aptSelect');
  select.innerHTML = '';
  markers.forEach(function(entry){
    var opt = document.createElement('option');
    opt.value = entry.apt.id;
    opt.textContent = entry.apt.nome[currentLang];
    select.appendChild(opt);
  });
  document.getElementById('modalTitle').textContent = t.genericModalTitle;
  document.getElementById('modalSub').style.display = 'none';
  document.getElementById('aptSelectField').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('open');
  resetContactForm();
  onAptSelectChange();
}

function onAptSelectChange(){
  var select = document.getElementById('aptSelect');
  var entry = markers.filter(function(e){return e.apt.id===select.value;})[0];
  if(!entry) return;
  document.getElementById('modalApt').value = entry.apt.nome[currentLang];
  document.getElementById('modalMailto').href = entry.mailtoHref;
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

// ============================================================
// INVIO FORM VIA FETCH (Formspree) — resta sul sito, niente redirect
// ============================================================
var contactForm = document.getElementById('contactForm');
var formStatus = document.getElementById('formStatus');

contactForm.addEventListener('submit', function(e){
  e.preventDefault();
  var t = i18n[currentLang];
  var submitBtn = contactForm.querySelector('.modal-submit');
  var originalLabel = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = t.sending;

  var formData = new FormData(contactForm);

  fetch(contactForm.action, {
    method: 'POST',
    body: formData,
    headers: { 'Accept': 'application/json' }
  })
  .then(function(response){
    if(response.ok){
      contactForm.style.display = 'none';
      formStatus.textContent = t.successMsg;
      formStatus.className = 'success';
      formStatus.style.display = 'block';
    } else {
      throw new Error('Network response was not ok');
    }
  })
  .catch(function(){
    formStatus.textContent = t.errorMsg;
    formStatus.className = 'error';
    formStatus.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalLabel;
  });
});

// Reset del form quando si chiude o si riapre la modale
function resetContactForm(){
  contactForm.reset();
  contactForm.style.display = 'block';
  formStatus.style.display = 'none';
  var submitBtn = contactForm.querySelector('.modal-submit');
  submitBtn.disabled = false;
  submitBtn.textContent = i18n[currentLang].submitBtn;
}

// ============================================================
// SIDEBAR TOGGLE (mobile)
// ============================================================
function toggleLegend(){
  document.getElementById('legend').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeLegend(){
  document.getElementById('legend').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ============================================================
// LINGUA / LANGUAGE / LANGUE
// ============================================================
function applyLanguage(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  var t = i18n[lang];

  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    if(t[key]) el.innerHTML = t[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
    var key = el.getAttribute('data-i18n-placeholder');
    if(t[key]) el.setAttribute('placeholder', t[key]);
  });

  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-lang')===lang);
  });

  renderAllPopups();
}

document.querySelectorAll('.lang-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    applyLanguage(btn.getAttribute('data-lang'));
  });
});

// Init: try to detect browser language, default to IT
(function(){
  var browserLang = (navigator.language || 'it').slice(0,2).toLowerCase();
  var initialLang = (browserLang==='en' || browserLang==='fr') ? browserLang : 'it';
  applyLanguage(initialLang);
})();
</script>
